default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "postgres" } %>

development:
  <<: *default
  database: inertia_template_development

test:
  <<: *default
  database: inertia_template_test

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "inertia_template_production" } %>
