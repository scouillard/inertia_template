# SQLite for development and test (no local Postgres required).
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

# Production uses PostgreSQL via Kamal accessory.
# solid_cache, solid_queue, and solid_cable all share the same database
# (no separate files needed unlike SQLite) — each uses its own tables
# via separate migrations_paths.
production:
  primary: &production_primary
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    database: <%= ENV.fetch("DB_NAME", "inertia_template_production") %>
    username: <%= ENV.fetch("DB_USERNAME", "app") %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *production_primary
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_primary
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_primary
    migrations_paths: db/cable_migrate
